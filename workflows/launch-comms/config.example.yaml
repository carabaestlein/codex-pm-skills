# Copy this file to config.local.yaml and replace placeholder values.
# Shared product, ICP, positioning, and voice context should live in the root
# config.local.yaml copied from config.example.yaml.
#
# Minimum required fields:
# - global_config
#
# Everything else is optional output tuning.
#
# Minimal required example:
#
# global_config: "config.local.yaml"

global_config: "config.local.yaml"

outputs:
  # Optional. If omitted, the skill uses its default output set.
  channels:
    - "release_note"
    - "changelog_entry"
    - "linkedin_post"
    - "short_social_post"
    - "internal_enablement_blurb"
  # Optional.
  include_open_questions: true

links:
  # Optional. Add when available.
  docs_url: "https://example.com/docs/feature"
  cta_url: "https://example.com/blog/feature"
