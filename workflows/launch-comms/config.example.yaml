# Copy this file to config.local.yaml and replace placeholder values.
# This config provides reusable PM, ICP, tone, and channel context for
# $release-notes-and-social.
#
# Minimum required fields:
# - product.name
# - product.category
# - audience.primary_icp
#
# Everything else is optional context or output tuning.
#
# Minimal required example:
#
# product:
#   name: "Acme"
#   category: "B2B SaaS customer support"
#
# audience:
#   primary_icp: "VP Support at mid-market SaaS companies"

product:
  # Required.
  name: "Acme"
  # Required.
  category: "B2B SaaS customer support"
  # Optional. Helps maintain consistent naming.
  terminology:
    customer: "customer"
    user: "agent"
    admin: "admin"

audience:
  # Required.
  primary_icp: "VP Support at mid-market SaaS companies"
  # Optional.
  personas:
    - "Support operations leader"
    - "Support admin"
    - "Support agent"

positioning:
  # Optional. Helps keep the copy aligned to the product's current narrative.
  core_value: "Help support teams resolve customer issues faster without losing control of quality."
  # Optional. Claims or phrases to avoid unless directly supported by the docs.
  avoid_claims:
    - "fully autonomous"
    - "guaranteed deflection"
    - "SOC 2 compliant"

voice:
  # Optional. Defaults to clear, specific, and low-hype.
  tone: "clear, specific, practical, low-hype"
  banned_phrases:
    - "game-changing"
    - "unlock"
    - "seamless"

outputs:
  # Optional. If omitted, the skill uses its default output set.
  channels:
    - "release_note"
    - "changelog_entry"
    - "linkedin_post"
    - "short_social_post"
    - "internal_enablement_blurb"
  # Optional.
  include_open_questions: true

links:
  # Optional. Add when available.
  docs_url: "https://example.com/docs/feature"
  cta_url: "https://example.com/blog/feature"
